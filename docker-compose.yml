services:
  app-dev:
    profiles: ["dev"]
    mem_limit: 1024M
    build:
      context: .
      dockerfile: dockerfile.dev
    ports:
      - "3300:3300"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - MONGODB_URI=${MONGODB_URI}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_TOKEN_SECRET=${ADMIN_TOKEN_SECRET}
      - PRIVATE_PASSWORD=${PRIVATE_PASSWORD}
      - PRIVATE_TOKEN_SECRET=${PRIVATE_TOKEN_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  app:
    profiles: ["production"]
    mem_limit: 1024M
    user: "1001:1001"
    build:
      context: .
      dockerfile: dockerfile
      target: runner
      args:
        - MONGODB_URI=${MONGODB_URI}
        - NEXT_PUBLIC_DISABLE_ANALYTICS=${NEXT_PUBLIC_DISABLE_ANALYTICS}
    ports:
      - "3300:3300"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.boss478.rule=Host(`srv1676702.hstgr.cloud`)"
      - "traefik.http.routers.boss478.entrypoints=websecure"
      - "traefik.http.routers.boss478.tls.certresolver=letsencrypt"
      - "traefik.http.services.boss478.loadbalancer.server.url=http://127.0.0.1:3300"
    volumes:
      - ./uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_TOKEN_SECRET=${ADMIN_TOKEN_SECRET}
      - PRIVATE_PASSWORD=${PRIVATE_PASSWORD}
      - PRIVATE_TOKEN_SECRET=${PRIVATE_TOKEN_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
    restart: always

  mongo:
    mem_limit: 1536M
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo-express:
    mem_limit: 128M
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/
      - ME_CONFIG_BASICAUTH=true
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGO_EXPRESS_USERNAME}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_EXPRESS_PASSWORD}
    depends_on:
      mongo:
        condition: service_healthy
    restart: always

volumes:
  mongo_data:
